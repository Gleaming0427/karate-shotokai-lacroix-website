backend:
  name: git-gateway
  branch: main

media_folder: "public/images/articles"
public_folder: "/images/articles"

editor:
  preview: false

collections:
  - name: "techniques"
    label: "Techniques"
    label_singular: "Article technique"
    folder: "src/content/techniques"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: true
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", default: "{{now}}" }
      - { label: "Image", name: "image", widget: "image", required: false, hint: "Image d'en-tête de l'article" }
      - label: "Contenu"
        name: "body"
        widget: "markdown"
        default: "Écrivez votre article ici..."
        modes:
          - rich_text
          - raw
        default_mode: rich_text
        buttons:
          - bold
          - italic
          - code
          - link
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

locale: "fr"
