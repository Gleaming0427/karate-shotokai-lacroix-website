<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration</title>
  <script src="https://unpkg.com/decap-cms@3.6.1/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script>
    CMS.init({
      config: {
        backend: { name: 'git-gateway', branch: 'main' },
        media_folder: 'public/images/articles',
        public_folder: '/images/articles',
        collections: [{
          name: 'techniques',
          label: 'Techniques',
          label_singular: 'Article technique',
          folder: 'src/content/techniques',
          create: true,
          slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
          fields: [
            { label: 'Titre', name: 'title', widget: 'string' },
            { label: 'Date', name: 'date', widget: 'datetime', default: '{{now}}' },
            { label: 'Image', name: 'image', widget: 'image', required: false },
            { label: 'Contenu', name: 'body', widget: 'markdown' }
          ]
        }],
        locale: 'fr'
      }
    });
  </script>
</body>
</html>
