<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration</title>
  <style>
    [class*="editor"] img, [class*="Editor"] img, [data-slate-editor] img { max-width: 500px !important; max-height: 350px !important; height: auto !important; object-fit: contain !important; }
  </style>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/decap-cms@3.6.1/dist/decap-cms.js"></script>
  <script>
    CMS.registerEditorComponent({
      id: 'image',
      label: 'Image',
      fields: [
        { name: 'src', label: 'Image', widget: 'image' },
        { name: 'alt', label: 'Texte alternatif', widget: 'string' },
        { name: 'width', label: 'Largeur (px)', widget: 'number', default: 600, min: 100, max: 1200 }
      ],
      pattern: /^<img src="(.*?)" alt="(.*?)" width="(\d+)"\s?\/?>$/,
      fromBlock: function(match) {
        return { src: match[1], alt: match[2] || '', width: parseInt(match[3]) || 600 };
      },
      toBlock: function(obj) {
        return '<img src="' + obj.src + '" alt="' + (obj.alt || '') + '" width="' + (obj.width || 600) + '" />';
      },
      toPreview: function(obj) {
        return '<img src="' + obj.src + '" alt="' + (obj.alt || '') + '" style="max-width:100%;width:' + (obj.width || 600) + 'px" />';
      }
    });

    CMS.init();
  </script>
</body>
</html>
